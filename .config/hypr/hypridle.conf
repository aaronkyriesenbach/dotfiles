general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple hyprlock instances.
    before_sleep_cmd = loginctl lock-session    # lock before suspend.
    after_sleep_cmd = ~/.config/hypr/dpms.sh on # restore monitors after suspend.
}

# Lock screen first — gives hyprlock time to render and settle
# before DPMS cuts the signal.
listener {
    timeout = 900
    on-timeout = loginctl lock-session
}

# Turn monitors off 30s after lock, avoiding the race condition
# where hyprlock frame commits reset the idle timer.
listener {
    timeout = 930
    on-timeout = ~/.config/hypr/dpms.sh off
    on-resume = ~/.config/hypr/dpms.sh on
}
